name: Release

# Cross-platform `codeoid-tui` binaries, attached to the GitHub Release that
# release-plz creates for each `v*` tag. Crate publishing, version management,
# tagging, and the release notes are handled by release-plz
# (.github/workflows/release-plz.yml) — this workflow only builds + uploads the
# prebuilt binaries.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # upload assets to the release

env:
  CARGO_TERM_COLOR: always

jobs:
  binaries:
    name: Binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-13, target: x86_64-apple-darwin }
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build codeoid-tui
        run: cargo build --release -p codeoid-tui --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        run: |
          DIR="codeoid-tui-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$DIR"
          cp "target/${{ matrix.target }}/release/codeoid-tui" "$DIR/"
          cp README.md LICENSE "$DIR/" 2>/dev/null || true
          tar -czf "${DIR}.tar.gz" "$DIR"
          echo "ASSET=${DIR}.tar.gz" >> "$GITHUB_ENV"

      # release-plz already created the release with changelog notes — just
      # attach the binary, don't regenerate the body.
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: false
