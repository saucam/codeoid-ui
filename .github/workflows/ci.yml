name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install coverage tools (cargo-llvm-cov, cargo-nextest)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      # Clippy is advisory for now (the workspace opts into clippy::pedantic).
      # Tighten to `-- -D warnings` once the pedantic backlog is cleared.
      - name: Clippy
        run: cargo clippy --all-targets --all-features

      - name: Build
        run: cargo build --all-targets --locked

      # cargo-llvm-cov wraps nextest, so one instrumented run yields both the
      # lcov coverage report and (via the `ci` nextest profile) a JUnit report
      # at target/nextest/ci/junit.xml.
      - name: Test + coverage
        run: cargo llvm-cov nextest --workspace --locked --profile ci --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          flags: tui
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: target/nextest/ci/junit.xml
          flags: tui
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
