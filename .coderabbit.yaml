# CodeRabbit configuration — https://docs.coderabbit.ai/reference/configuration
# Free for open-source. Install the GitHub App once at https://coderabbit.ai
# (sign in with GitHub → add saucam/codeoid-ui); this file then governs reviews.
language: en-US
early_access: false
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  poem: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!target/**"
    - "!**/*.lock"
  tools:
    clippy:
      enabled: true
chat:
  auto_reply: true
